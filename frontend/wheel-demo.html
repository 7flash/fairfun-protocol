<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Wheel Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%); 
            min-height: 100vh; 
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const GalaxyWheelDemo = () => {
            // Wheel segments
            const segments = [
                { label: "NOTHING", color: "#475569", percent: 10, reward: 0 },
                { label: "1%", color: "#10b981", percent: 75, reward: 1 },
                { label: "10%", color: "#3b82f6", percent: 14, reward: 10 },
                { label: "50%", color: "#f59e0b", percent: 1, reward: 50 },
            ];
            const treasuryBalance = 2.5;

            // Demo mode state
            const [isSpinning, setIsSpinning] = useState(false);
            const [targetTier, setTargetTier] = useState(null);
            const [result, setResult] = useState(null);

            // Animation state
            const [angle, setAngle] = useState(0);
            const angleRef = useRef(0);
            const rafRef = useRef();
            const phaseRef = useRef('idle');
            const startTimeRef = useRef(0);
            const targetAngleRef = useRef(null);
            const decelStartAngleRef = useRef(0);

            // Segment ranges
            const segmentRanges = useMemo(() => {
                let c = 0;
                return segments.map(s => {
                    const span = (s.percent / 100) * 360;
                    const r = { start: c, end: c + span };
                    c += span;
                    return r;
                });
            }, []);

            // Pick landing angle
            const pickTarget = useCallback((tier) => {
                const r = segmentRanges[tier];
                const pad = 8;
                const inRange = r.start + pad + Math.random() * (r.end - r.start - pad * 2);
                const spins = 4 + Math.floor(Math.random() * 3);
                const current = angleRef.current % 360;
                let diff = inRange - current;
                if (diff < 0) diff += 360;
                return angleRef.current + spins * 360 + diff;
            }, [segmentRanges]);

            // Easing
            const easeOutExpo = (t) => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
            const easeInQuad = (t) => t * t;

            // Animation loop
            useEffect(() => {
                if (!isSpinning) {
                    phaseRef.current = 'idle';
                    return;
                }

                const loop = (now) => {
                    if (phaseRef.current === 'idle') {
                        phaseRef.current = 'accel';
                        startTimeRef.current = now;
                    }

                    const elapsed = now - startTimeRef.current;

                    if (phaseRef.current === 'accel') {
                        const t = Math.min(1, elapsed / 600);
                        const speed = easeInQuad(t) * 10;
                        angleRef.current += speed;
                        setAngle(angleRef.current);
                        if (t >= 1) phaseRef.current = 'cruise';
                    }
                    else if (phaseRef.current === 'cruise') {
                        angleRef.current += 10;
                        setAngle(angleRef.current);

                        if (targetTier !== null && !targetAngleRef.current) {
                            targetAngleRef.current = pickTarget(targetTier);
                            decelStartAngleRef.current = angleRef.current;
                            startTimeRef.current = now;
                            phaseRef.current = 'decel';
                        }
                    }
                    else if (phaseRef.current === 'decel') {
                        const t = Math.min(1, (now - startTimeRef.current) / 3000);
                        const eased = easeOutExpo(t);
                        const totalDist = targetAngleRef.current - decelStartAngleRef.current;
                        angleRef.current = decelStartAngleRef.current + totalDist * eased;
                        setAngle(angleRef.current);

                        if (t >= 1) {
                            angleRef.current = targetAngleRef.current;
                            setAngle(angleRef.current);
                            targetAngleRef.current = null;
                            phaseRef.current = 'idle';
                            setIsSpinning(false);
                            setResult(segments[targetTier]);
                            setTargetTier(null);
                            return;
                        }
                    }

                    rafRef.current = requestAnimationFrame(loop);
                };

                rafRef.current = requestAnimationFrame(loop);
                return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
            }, [isSpinning, targetTier, pickTarget]);

            // Demo handler
            const handleSpin = () => {
                if (isSpinning) return;
                setResult(null);
                setIsSpinning(true);
                const r = Math.random() * 100;
                const tier = r < 10 ? 0 : r < 85 ? 1 : r < 99 ? 2 : 3;
                setTimeout(() => setTargetTier(tier), 800);
            };

            const displayAngle = ((angle % 360) + 360) % 360;

            return (
                <div style={{ 
                    background: 'linear-gradient(180deg, #0f172a 0%, #020617 100%)',
                    padding: '40px 24px',
                    borderRadius: '24px',
                    border: '1px solid rgba(251,191,36,0.2)',
                    textAlign: 'center',
                    boxShadow: '0 25px 80px rgba(0,0,0,0.5)'
                }}>
                    {/* Jackpot */}
                    <div style={{
                        display: 'inline-flex',
                        flexDirection: 'column',
                        background: 'rgba(251,191,36,0.1)',
                        border: '1px solid rgba(251,191,36,0.3)',
                        padding: '12px 28px',
                        borderRadius: '12px',
                        marginBottom: '24px'
                    }}>
                        <span style={{ fontSize: '11px', fontWeight: 600, color: '#fbbf24', letterSpacing: '1px' }}>🏆 JACKPOT POOL</span>
                        <span style={{ fontSize: '26px', fontWeight: 800, color: '#fbbf24', textShadow: '0 0 20px rgba(251,191,36,0.4)' }}>{treasuryBalance.toFixed(4)} SOL</span>
                    </div>

                    {/* Wheel */}
                    <div style={{ position: 'relative', width: '360px', height: '360px', margin: '0 auto 28px' }}>
                        <div style={{
                            position: 'absolute',
                            inset: '-30px',
                            borderRadius: '50%',
                            background: 'radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%)',
                            animation: 'glow-pulse 3s ease-in-out infinite'
                        }} />
                        <div style={{
                            width: '100%',
                            height: '100%',
                            borderRadius: '50%',
                            background: '#0f172a',
                            boxShadow: '0 0 0 6px #1e293b, 0 0 0 10px rgba(251,191,36,0.2), inset 0 0 40px rgba(0,0,0,0.5)'
                        }}>
                            <svg viewBox="0 0 400 400" style={{ width: '100%', height: '100%' }}>
                                <defs>
                                    <filter id="ball-glow" x="-50%" y="-50%" width="200%" height="200%">
                                        <feGaussianBlur stdDeviation="4" result="blur" />
                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                                    </filter>
                                </defs>

                                {segments.map((seg, i) => {
                                    const r = segmentRanges[i];
                                    const startRad = (r.start - 90) * Math.PI / 180;
                                    const endRad = (r.end - 90) * Math.PI / 180;
                                    const rad = 175;
                                    const x1 = 200 + rad * Math.cos(startRad);
                                    const y1 = 200 + rad * Math.sin(startRad);
                                    const x2 = 200 + rad * Math.cos(endRad);
                                    const y2 = 200 + rad * Math.sin(endRad);
                                    const large = r.end - r.start > 180 ? 1 : 0;
                                    const d = `M200,200 L${x1},${y1} A${rad},${rad} 0 ${large},1 ${x2},${y2} Z`;
                                    const mid = (r.start + r.end) / 2;
                                    const midRad = (mid - 90) * Math.PI / 180;
                                    const tx = 200 + 115 * Math.cos(midRad);
                                    const ty = 200 + 115 * Math.sin(midRad);

                                    return (
                                        <g key={i}>
                                            <path d={d} fill={seg.color} stroke="#0f172a" strokeWidth="3" />
                                            <g transform={`translate(${tx},${ty}) rotate(${mid})`}>
                                                <text fill="white" fontSize="15" fontWeight="800" textAnchor="middle" dominantBaseline="middle"
                                                    style={{ textShadow: '0 2px 4px rgba(0,0,0,0.8)' }}>
                                                    {seg.label}
                                                </text>
                                                {seg.reward > 0 && r.end - r.start > 15 && (
                                                    <text y="18" fill="rgba(255,255,255,0.75)" fontSize="10" textAnchor="middle">
                                                        {((treasuryBalance * seg.reward) / 100).toFixed(3)} SOL
                                                    </text>
                                                )}
                                            </g>
                                        </g>
                                    );
                                })}

                                <circle cx="200" cy="200" r="50" fill="#0f172a" stroke="#fbbf24" strokeWidth="4" />
                                <text x="200" y="195" fill="#fbbf24" fontSize="12" fontWeight="800" textAnchor="middle">GALAXY</text>
                                <text x="200" y="212" fill="#fbbf24" fontSize="12" fontWeight="800" textAnchor="middle">WHEEL</text>

                                <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="18" />

                                <g transform={`rotate(${-displayAngle}, 200, 200)`}>
                                    <circle cx="200" cy="40" r="7" fill="#fbbf24" opacity="0.3" />
                                    <circle cx="200" cy="40" r="10" fill="#fbbf24" opacity="0.5" />
                                    <circle cx="200" cy="40" r="14" fill="white" stroke="#fbbf24" strokeWidth="3" filter="url(#ball-glow)" />
                                </g>
                            </svg>
                        </div>
                        <div style={{
                            position: 'absolute',
                            top: '-8px',
                            left: '50%',
                            transform: 'translateX(-50%)',
                            fontSize: '28px',
                            color: '#fbbf24',
                            textShadow: '0 2px 8px rgba(0,0,0,0.8)',
                            zIndex: 10
                        }}>▼</div>
                    </div>

                    {/* Result */}
                    {result && (
                        <div style={{
                            marginBottom: '20px',
                            padding: '12px 24px',
                            borderRadius: '12px',
                            background: result.reward > 0 ? 'rgba(16, 185, 129, 0.2)' : 'rgba(100, 116, 139, 0.2)',
                            border: `1px solid ${result.color}`,
                            color: result.color,
                            fontWeight: 700,
                            fontSize: '18px'
                        }}>
                            {result.reward > 0 ? `🎉 You won ${result.reward}% = ${((treasuryBalance * result.reward) / 100).toFixed(4)} SOL!` : '😔 Better luck next time!'}
                        </div>
                    )}

                    {/* Button */}
                    <button 
                        onClick={handleSpin} 
                        disabled={isSpinning}
                        style={{
                            background: isSpinning 
                                ? 'linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%)' 
                                : 'linear-gradient(135deg, #fbbf24 0%, #d97706 100%)',
                            border: 'none',
                            borderRadius: '50px',
                            padding: '16px 48px',
                            color: 'white',
                            fontSize: '18px',
                            fontWeight: 800,
                            cursor: isSpinning ? 'not-allowed' : 'pointer',
                            boxShadow: isSpinning 
                                ? '0 4px 20px rgba(139,92,246,0.4)' 
                                : '0 4px 20px rgba(251,191,36,0.4)',
                            transition: 'all 0.2s',
                            display: 'flex',
                            flexDirection: 'column',
                            alignItems: 'center',
                            margin: '0 auto',
                            opacity: isSpinning ? 0.8 : 1
                        }}
                    >
                        {isSpinning ? '✨ SPINNING...' : '🎰 DEMO SPIN'}
                        <span style={{ fontSize: '11px', opacity: 0.9, marginTop: '4px' }}>No transaction required</span>
                    </button>

                    <style>{`
                        @keyframes glow-pulse { 
                            0%,100% { opacity: 0.5; } 
                            50% { opacity: 1; } 
                        }
                    `}</style>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<GalaxyWheelDemo />);
    </script>
</body>
</html>
